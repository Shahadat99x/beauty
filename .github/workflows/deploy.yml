name: Deploy Next.js Static Site to AWS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and deploy to S3
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: Confirm AWS identity
        run: aws sts get-caller-identity

      - name: Upload static export to S3
        run: aws s3 sync ./out s3://${{ secrets.S3_BUCKET }} --delete

      - name: Check CloudFront distributions
        run: |
          aws cloudfront list-distributions \
            --query "DistributionList.Items[*].{Id:Id,DomainName:DomainName,Status:Status}" \
            --output table

      - name: Invalidate CloudFront cache
        env:
          AWS_REGION: us-east-1
          AWS_DEFAULT_REGION: us-east-1
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E2FJ4PECSN4JIJ \
            --paths "/*"